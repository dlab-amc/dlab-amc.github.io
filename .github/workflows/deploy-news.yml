# news.zip: 마크다운은 전체 교체, 이미지는 ZIP에 포함된 변경분만 rsync 병합
name: Deploy News

on:
  push:
    paths:
      - 'data/news/news.zip'

jobs:
  unzip-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip news.zip
        run: |
          unzip -o data/news/news.zip -d temp_news

      - name: Deploy markdown files
        run: |
          mkdir -p _posts/new
          if [ -f temp_news/partial-deploy.json ]; then
            echo "Partial deploy — merge markdown (keep existing posts)"
            cp -f temp_news/_posts/new/*.md _posts/new/ 2>/dev/null || true
          else
            echo "Full deploy — replace all news markdown"
            rm -rf _posts/new/*
            mv -f temp_news/_posts/new/*.md _posts/new/ || true
          fi

      # ZIP에 없는 이미지는 레포에 그대로 유지 (신규·수정분만 temp에 포함)
      - name: Move image files preserving folder structure
        run: |
          if [ -d "temp_news/images/posts" ]; then
            mkdir -p images/posts
            rsync -a temp_news/images/posts/ images/posts/
          else
            echo "ℹ️ No new/changed images in zip. Markdown-only deploy."
          fi

      - name: Commit and Push
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git add _posts/new/ images/posts/
          git commit -m "[AUTO] Deployed news.zip (markdowns + images)" || echo "No changes"
          git push https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/dlab-amc/dlab-amc.github.io.git HEAD:main
